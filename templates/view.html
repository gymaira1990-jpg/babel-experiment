<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴别塔实验 · 染色画布 / Babel Experiment · Dye Canvas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        h1 {
            font-size: 18px; font-weight: 400; letter-spacing: 4px;
            color: #888; margin-bottom: 4px; text-transform: uppercase;
        }
        .subtitle {
            font-size: 12px; color: #555; margin-bottom: 16px;
            letter-spacing: 2px;
        }
        .canvas-container {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 4px;
            border-radius: 2px;
            line-height: 0;
        }
        #canvas {
            image-rendering: pixelated;
        }
        .stats-bar {
            display: flex; flex-wrap: wrap; gap: 16px;
            justify-content: center; margin-top: 16px;
            font-size: 13px; color: #777;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            color: #ddd; font-size: 16px; font-weight: 500;
        }
        .stat-label {
            font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        .frozen-banner {
            background: #8b0000; color: #fff; padding: 6px 16px;
            border-radius: 2px; font-size: 13px; letter-spacing: 2px;
            margin-top: 12px; display: none;
        }
        .growth-timeline {
            margin-top: 16px; width: 100%; max-width: 600px;
        }
        .growth-timeline h3 {
            font-size: 11px; color: #555; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 6px;
        }
        .growth-entry {
            font-size: 11px; color: #666;
            padding: 2px 0; border-bottom: 1px solid #222;
        }
        .footer {
            margin-top: 24px; font-size: 10px; color: #444;
            letter-spacing: 1px; text-align: center;
        }
        .footer a { color: #555; text-decoration: none; }
        .footer a:hover { color: #888; }
        @media (max-width: 600px) {
            .stats-bar { gap: 8px; font-size: 11px; }
            h1 { font-size: 14px; }
        }
    </style>
</head>
<body>
    <h1>巴别塔实验 · 染色画布</h1>
    <div class="subtitle">Babel Experiment · Dye Canvas</div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="frozen-banner" id="frozenBanner">⏸ 画布已冻结 · Canvas Frozen</div>

    <div class="stats-bar" id="statsBar">
        <div class="stat-item">
            <div class="stat-value" id="statSignals">0</div>
            <div class="stat-label">信号 / Signals</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statPixels">0</div>
            <div class="stat-label">非空白 / Filled</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statRatio">0%</div>
            <div class="stat-label">填充率 / Fill</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statSize">200×200</div>
            <div class="stat-label">尺寸 / Size</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statGrowth">0</div>
            <div class="stat-label">成长 / Growth</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statGod">0</div>
            <div class="stat-label">干预 / God</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="statUptime">--</div>
            <div class="stat-label">运行时长 / Uptime</div>
        </div>
    </div>

    <div class="growth-timeline" id="growthTimeline">
        <h3>📈 成长记录 / Growth Timeline</h3>
        <div id="growthLog"></div>
    </div>

    <div class="footer">
        历史 · 文明 · 数字 · 进化 · 巅峰 &nbsp;|&nbsp;
        <a href="/admin" target="_blank">上帝之手</a> &nbsp;|&nbsp;
        <a href="/stats" target="_blank">统计</a>
    </div>

    <script>
        const PIXEL_SIZE = {{ pixel_size }};
        const REFRESH_MS = {{ refresh_interval }} * 1000;

        const canvasEl = document.getElementById("canvas");
        const ctx = canvasEl.getContext("2d");

        function formatUptime(seconds) {
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (d > 0) return d + "d " + h + "h";
            if (h > 0) return h + "h " + m + "m";
            if (m > 0) return m + "m " + s + "s";
            return s + "s";
        }

        function drawCanvas(data) {
            const w = data.width;
            const h = data.height;
            const pixels = data.pixels;

            canvasEl.width = w * PIXEL_SIZE;
            canvasEl.height = h * PIXEL_SIZE;

            const imageData = ctx.createImageData(w * PIXEL_SIZE, h * PIXEL_SIZE);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const color = pixels[y] && pixels[y][x] ? pixels[y][x] : "#FFFFFF";
                    const r = parseInt(color.slice(1, 3), 16);
                    const g = parseInt(color.slice(3, 5), 16);
                    const b = parseInt(color.slice(5, 7), 16);

                    // Scale pixel to PIXEL_SIZE blocks
                    for (let dy = 0; dy < PIXEL_SIZE; dy++) {
                        for (let dx = 0; dx < PIXEL_SIZE; dx++) {
                            const px = (y * PIXEL_SIZE + dy) * (w * PIXEL_SIZE) + (x * PIXEL_SIZE + dx);
                            const idx = px * 4;
                            imageData.data[idx] = r;
                            imageData.data[idx + 1] = g;
                            imageData.data[idx + 2] = b;
                            imageData.data[idx + 3] = 255;
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function updateStats(data) {
            document.getElementById("statSignals").textContent = data.total_signals.toLocaleString();
            document.getElementById("statPixels").textContent = data.non_blank_pixels.toLocaleString();
            document.getElementById("statRatio").textContent = (data.fill_ratio * 100).toFixed(1) + "%";
            document.getElementById("statSize").textContent = data.width + "×" + data.height;
            document.getElementById("statGrowth").textContent = data.growth_count;
            document.getElementById("statGod").textContent = data.god_interventions;

            if (data.created_at) {
                const created = new Date(data.created_at);
                const uptime = Math.floor((Date.now() - created.getTime()) / 1000);
                document.getElementById("statUptime").textContent = formatUptime(uptime);
            }

            // Frozen banner
            const banner = document.getElementById("frozenBanner");
            if (data.is_frozen) {
                banner.style.display = "block";
            } else {
                banner.style.display = "none";
            }

            // Growth timeline
            const logEl = document.getElementById("growthLog");
            if (data.growth_log && data.growth_log.length > 0) {
                let html = "";
                const logs = [...data.growth_log].reverse();
                for (const entry of logs) {
                    const time = new Date(entry.time);
                    const timeStr = time.toLocaleTimeString();
                    html += '<div class="growth-entry">'
                        + timeStr + ' — 成长: ' + entry.from_size + ' → ' + entry.to_size
                        + ' (填充率 ' + (entry.ratio * 100).toFixed(1) + '%)'
                        + '</div>';
                }
                logEl.innerHTML = html;
            }
        }

        function fetchCanvas() {
            fetch("/canvas")
                .then(r => r.json())
                .then(data => {
                    drawCanvas(data);
                    updateStats(data);
                })
                .catch(err => console.error("Fetch error:", err));
        }

        // Initial fetch
        fetchCanvas();
        // Auto-refresh
        setInterval(fetchCanvas, REFRESH_MS);
    </script>
</body>
</html>
